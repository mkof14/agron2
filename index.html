                blue: {

              }
            },
            boxShadow: {

              'soft-2xl': '0 25px 50px -12px rgba(0, 0, 0, 0.1)',
              'soft-3xl': '0 35px 60px -15px rgba(0, 0, 0, 0.15)',
              'inner-glow': 'inset 0 1px 1px 0 rgba(255, 255, 255, 0.05)',
              'inner-glow-white': 'inset 0 1px 1px 0 rgba(255, 255, 255, 0.8)',
              'accent-glow': '0 0 30px rgba(245, 158, 11, 0.2)',
              'blue-glow': '0 20px 40px -15px rgba(59, 130, 246, 0.4)',
              'green-glow': '0 20px 40px -15px rgba(16, 185, 129, 0.4)',
              'red-glow': '0 20px 40px -15px rgba(239, 68, 68, 0.4)',
            },
            backgroundImage: {
              'grid-pattern': "url(\"data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm1 1h38v38H1V1z' fill='%233b82f6' fill-opacity='0.05'/%3E%3C/svg%3E\")",

              'shimmer': 'linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent)',
              'radial-vibe': 'radial-gradient(circle at 50% 50%, var(--tw-gradient-from) 0%, transparent 70%)',

    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

      :root {
        --theme-bg: #ffffff;
        --theme-text: #0f172a;
        --theme-border: #e2e8f0;
        --theme-surface: #ffffff;
        --accent-glow: rgba(59, 130, 246, 0.1);
      }

      .dark {
        --theme-bg: #030712;
        --theme-text: #f8fafc;
        --theme-border: #1e293b;
        --theme-surface: #0f172a;
        --accent-glow: rgba(59, 130, 246, 0.05);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--theme-bg);
        color: var(--theme-text);
        overflow-x: hidden;
      }

      .glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .dark .glass {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .noise-bg {
        position: relative;
      }
      
      .noise-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      .light-depth {
        background: radial-gradient(circle at 0% 0%, #ffffff 0%, #f1f5f9 50%, #e2e8f0 100%);
        background-attachment: fixed;
      }
      
      .light-depth::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: 
          radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.05) 1px, transparent 0);
        background-size: 32px 32px;
        pointer-events: none;
        z-index: -1;
      }

      .dark-depth {
        background: radial-gradient(circle at 50% 0%, #030712 0%, #000000 100%);
      }
      
      .dark-depth::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: 
          radial-gradient(circle at 1px 1px, rgba(59, 130, 246, 0.03) 1px, transparent 0);
        background-size: 32px 32px;
        pointer-events: none;
        z-index: -1;
      }

      .shadow-float {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
      }

      .dark .shadow-float {
        box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.6);
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--theme-bg); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--theme-border); 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3b82f6; 
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }

      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4)); }
        50% { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.7)); }
      }

      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      .animate-float {
        animation: float 5s ease-in-out infinite;
      }

      .animate-pulse-glow {
        animation: pulse-glow 3s ease-in-out infinite;
      }

      .glow-text {
        text-shadow: 0 0 15px currentColor;
      }

      /* Custom transitions */
      .page-transition-enter { opacity: 0; transform: translateY(10px); }
      .page-transition-enter-active { opacity: 1; transform: translateY(0); transition: all 400ms ease-out; }
      .page-transition-exit { opacity: 1; transform: translateY(0); }
      .page-transition-exit-active { opacity: 0; transform: translateY(-10px); transition: all 400ms ease-in; }

      .presentation-input {
        width: 100%;
        border-radius: 1rem;
        border: 1px solid var(--theme-border);
        background: var(--theme-surface);
        color: var(--theme-text);
        padding: 0.85rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        outline: none;
      }

      .presentation-input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16);
      }

      .presentation-input::placeholder {
        color: #94a3b8;
      }
    </style>
</head>

    <script type="module" src="/index.tsx"></script>
